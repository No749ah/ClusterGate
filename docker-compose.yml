# =============================================================================
# ClusterGate - Docker Compose (Local Development)
# =============================================================================

networks:
  clustergate:
    driver: bridge

volumes:
  postgres_data:
  backend_logs:

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL Database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: clustergate-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-clustergate}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-clustergate}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - clustergate
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-clustergate} -d ${POSTGRES_DB:-clustergate}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Backend API
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: clustergate-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-clustergate}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-clustergate}?schema=public
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3001
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
      PROXY_TIMEOUT: ${PROXY_TIMEOUT:-30000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      METRICS_ENABLED: ${METRICS_ENABLED:-true}
      METRICS_SECRET: ${METRICS_SECRET:-dev-metrics-secret}
      LOG_RETENTION_DAYS: ${LOG_RETENTION_DAYS:-90}
    volumes:
      - ./backend:/app
      - /app/node_modules
      - backend_logs:/app/logs
      # Docker socket removed — use external update mechanism instead (security risk)
    ports:
      - "3001:3001"
    networks:
      - clustergate
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ---------------------------------------------------------------------------
  # Frontend
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
        NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-ClusterGate}
    container_name: clustergate-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-ClusterGate}
    ports:
      - "3000:3000"
    networks:
      - clustergate
    depends_on:
      - backend

  # ---------------------------------------------------------------------------
  # Adminer (Database UI - Dev only)
  # ---------------------------------------------------------------------------
  adminer:
    image: adminer:latest
    container_name: clustergate-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    networks:
      - clustergate
    depends_on:
      - postgres
    profiles:
      - tools
