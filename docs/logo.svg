<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 140" width="540" height="140">
  <!-- Background -->
  <rect width="540" height="140" rx="14" fill="#0f172a"/>

  <!-- Hexagon cluster nodes -->
  <!-- Center node -->
  <circle cx="62" cy="70" r="18" fill="#3b82f6" opacity="0.95"/>
  <!-- Top-left -->
  <circle cx="30" cy="40" r="11" fill="#6366f1" opacity="0.85"/>
  <!-- Top-right -->
  <circle cx="96" cy="40" r="11" fill="#6366f1" opacity="0.85"/>
  <!-- Bottom-left -->
  <circle cx="30" cy="100" r="11" fill="#6366f1" opacity="0.85"/>
  <!-- Bottom-right -->
  <circle cx="96" cy="100" r="11" fill="#6366f1" opacity="0.85"/>

  <!-- Connecting lines -->
  <line x1="62" y1="70" x2="30" y2="40" stroke="#3b82f6" stroke-width="2" opacity="0.6"/>
  <line x1="62" y1="70" x2="96" y2="40" stroke="#3b82f6" stroke-width="2" opacity="0.6"/>
  <line x1="62" y1="70" x2="30" y2="100" stroke="#3b82f6" stroke-width="2" opacity="0.6"/>
  <line x1="62" y1="70" x2="96" y2="100" stroke="#3b82f6" stroke-width="2" opacity="0.6"/>

  <!-- Gate arrow -->
  <line x1="110" y1="70" x2="145" y2="70" stroke="#22d3ee" stroke-width="3" stroke-linecap="round"/>
  <polygon points="142,64 152,70 142,76" fill="#22d3ee"/>

  <!-- Text: ClusterGate -->
  <text x="165" y="58" font-family="'Segoe UI', system-ui, sans-serif" font-size="36" font-weight="700" fill="#f1f5f9" letter-spacing="-1">Cluster</text>
  <text x="165" y="58" font-family="'Segoe UI', system-ui, sans-serif" font-size="36" font-weight="700" fill="#22d3ee" letter-spacing="-1" dx="148">Gate</text>

  <!-- Tagline -->
  <text x="165" y="88" font-family="'Segoe UI', system-ui, sans-serif" font-size="14" fill="#94a3b8" letter-spacing="0.5">Kubernetes Routing Gateway Platform</text>

  <!-- Small decorative dots -->
  <circle cx="165" cy="108" r="3" fill="#3b82f6" opacity="0.7"/>
  <circle cx="178" cy="108" r="3" fill="#6366f1" opacity="0.7"/>
  <circle cx="191" cy="108" r="3" fill="#22d3ee" opacity="0.7"/>
</svg>
