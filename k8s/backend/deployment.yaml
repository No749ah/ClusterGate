apiVersion: apps/v1
kind: Deployment
metadata:
  name: clustergate-backend
  namespace: clustergate
  labels:
    app: clustergate-backend
    app.kubernetes.io/name: clustergate
    app.kubernetes.io/component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: clustergate-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: clustergate-backend
        app.kubernetes.io/name: clustergate
        app.kubernetes.io/component: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3001"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: clustergate-backend
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
      terminationGracePeriodSeconds: 60
      containers:
        - name: backend
          image: your-registry/clustergate-backend:latest  # Replace with your image
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
              name: http
          envFrom:
            - configMapRef:
                name: clustergate-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: clustergate-secrets
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: clustergate-secrets
                  key: JWT_SECRET
            - name: METRICS_SECRET
              valueFrom:
                secretKeyRef:
                  name: clustergate-secrets
                  key: METRICS_SECRET
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /api/health/live
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health/ready
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: logs
              mountPath: /app/logs
      volumes:
        - name: logs
          emptyDir:
            sizeLimit: 2Gi
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: clustergate-backend
  namespace: clustergate
  labels:
    app.kubernetes.io/name: clustergate
