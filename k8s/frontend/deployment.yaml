apiVersion: apps/v1
kind: Deployment
metadata:
  name: clustergate-frontend
  namespace: clustergate
  labels:
    app: clustergate-frontend
    app.kubernetes.io/name: clustergate
    app.kubernetes.io/component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: clustergate-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: clustergate-frontend
        app.kubernetes.io/name: clustergate
        app.kubernetes.io/component: frontend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: frontend
          image: ghcr.io/no749ah/clustergate-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: clustergate-config
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: clustergate-frontend
  namespace: clustergate
  labels:
    app: clustergate-frontend
    app.kubernetes.io/name: clustergate
    app.kubernetes.io/component: frontend
spec:
  type: ClusterIP
  selector:
    app: clustergate-frontend
  ports:
    - port: 3000
      targetPort: 3000
      name: http
