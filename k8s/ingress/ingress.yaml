apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: clustergate
  namespace: clustergate
  labels:
    app.kubernetes.io/name: clustergate
  annotations:
    # NGINX Ingress Controller annotations
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "10"
    # TLS - cert-manager
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    # Rate limiting at ingress level (additional layer)
    nginx.ingress.kubernetes.io/limit-rps: "50"
    # Security headers
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Frame-Options: DENY";
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "X-XSS-Protection: 1; mode=block";
      more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - clustergate.example.com
      secretName: clustergate-tls
  rules:
    - host: clustergate.example.com
      http:
        paths:
          # Backend API
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: clustergate-backend
                port:
                  number: 3001
          # Proxy routes (routed to backend)
          - path: /r
            pathType: Prefix
            backend:
              service:
                name: clustergate-backend
                port:
                  number: 3001
          # Prometheus metrics (restrict access!)
          - path: /metrics
            pathType: Exact
            backend:
              service:
                name: clustergate-backend
                port:
                  number: 3001
          # Frontend (catch-all)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: clustergate-frontend
                port:
                  number: 3000
